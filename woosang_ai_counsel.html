<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우상법률사무소 AI 상담원</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');

:root {
  --navy-900: #0a1628;
  --navy-800: #0f2142;
  --navy-700: #16305c;
  --navy-600: #1e3f73;
  --gold: #c9a45c;
  --gold-light: #e0c389;
  --gold-dim: #8a703f;
  --cream: #f7f4ed;
  --text-light: #e8ecf2;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(160deg, var(--navy-900) 0%, var(--navy-800) 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: linear-gradient(135deg, var(--navy-800), var(--navy-700));
  color: var(--text-light);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 1px solid rgba(201,164,92,0.35);
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
}
.header-icon {
  width: 44px; height: 44px;
  background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold-dim));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 0 1px rgba(201,164,92,0.4), 0 4px 10px rgba(0,0,0,0.4);
}
.header-info h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 17px; font-weight: 700;
  letter-spacing: 0.3px;
  color: var(--gold-light);
}
.header-info p { font-size: 11.5px; color: rgba(232,236,242,0.65); margin-top: 3px; letter-spacing: 0.2px; }
.online-badge {
  margin-left: auto;
  background: rgba(34,197,94,0.12);
  border: 1px solid rgba(34,197,94,0.5);
  color: #4ade80;
  font-size: 11px; font-weight: 500;
  padding: 5px 12px; border-radius: 20px;
  white-space: nowrap;
}

.chat-area {
  flex: 1; overflow-y: auto;
  padding: 24px 18px;
  display: flex; flex-direction: column; gap: 14px;
  max-width: 760px; width: 100%; margin: 0 auto;
}
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(201,164,92,0.3); border-radius: 10px; }

.msg { display: flex; gap: 10px; align-items: flex-end; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.msg.bot .msg-avatar {
  background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold-dim));
  box-shadow: 0 0 0 1px rgba(201,164,92,0.35);
}
.msg.user .msg-avatar { background: var(--navy-600); }
.msg-bubble {
  max-width: 76%; padding: 13px 17px;
  border-radius: 16px; font-size: 14.5px; line-height: 1.7;
}
.msg.bot .msg-bubble {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,164,92,0.18);
  color: var(--text-light);
  border-bottom-left-radius: 4px;
  backdrop-filter: blur(6px);
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--navy-600), var(--navy-700));
  color: #fff;
  border-bottom-right-radius: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

.choices { display: flex; flex-wrap: wrap; gap: 9px; padding: 4px 0 4px 44px; }
.choice-btn {
  background: rgba(201,164,92,0.06);
  border: 1px solid rgba(201,164,92,0.5);
  color: var(--gold-light);
  padding: 9px 18px; border-radius: 20px; font-size: 13px;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.choice-btn:hover { background: var(--gold); color: var(--navy-900); border-color: var(--gold); }

.result-card {
  max-width: 100%;
  background: linear-gradient(155deg, var(--navy-800), var(--navy-900));
  border: 1px solid rgba(201,164,92,0.3);
  border-radius: 16px;
  padding: 22px 22px 18px;
  margin-left: 44px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03);
}
.result-card + .result-card { margin-top: 4px; }
.result-title {
  font-family: 'Noto Serif KR', serif;
  color: var(--gold-light);
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.3px;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(201,164,92,0.22);
}
.result-title::before { content: ''; width: 4px; height: 14px; background: var(--gold); border-radius: 2px; display: inline-block; }

.summary-grid { display: flex; flex-direction: column; gap: 6px; }
.summary-row {
  display: flex; justify-content: space-between; gap: 12px;
  padding: 9px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13.5px;
}
.summary-row:last-child { border-bottom: none; }
.summary-label { color: rgba(201,164,92,0.85); font-weight: 500; flex-shrink: 0; min-width: 90px; }
.summary-value { color: var(--text-light); text-align: right; font-weight: 500; }

.stars { letter-spacing: 2px; font-size: 16px; color: var(--gold); }
.stars .dim { color: rgba(255,255,255,0.15); }

.grade-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 14px;
  border: 1.5px solid var(--gold);
  color: var(--gold-light);
  background: rgba(201,164,92,0.08);
}

.opinion-block, .check-block {
  font-size: 13.5px; line-height: 1.75; color: var(--text-light);
  background: rgba(255,255,255,0.02);
  border-left: 2px solid var(--gold-dim);
  padding: 10px 14px; border-radius: 6px;
  margin-top: 4px;
}
.check-block ul { padding-left: 18px; margin-top: 4px; }
.check-block li { margin-bottom: 3px; }

.reserve-banner {
  margin-top: 16px; padding: 14px 16px;
  background: rgba(201,164,92,0.08);
  border: 1px solid rgba(201,164,92,0.4);
  border-radius: 10px;
  text-align: center; font-size: 13px; color: var(--text-light);
  line-height: 1.7;
}
.reserve-banner b { color: var(--gold-light); }
.reserve-banner a { color: var(--gold-light); text-decoration: none; font-weight: 700; }

.input-area {
  background: var(--navy-800);
  padding: 14px 18px;
  border-top: 1px solid rgba(201,164,92,0.25);
  display: flex;

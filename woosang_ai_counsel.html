* { margin: 0; padding: 0; box-sizing: border-box; }

}

}
.header-info h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 18px; font-weight: 700;
  letter-spacing: 0.3px;

}

}

.chat-area {

}
.msg.bot .msg-avatar {

}
.msg.user .msg-avatar { background: var(--navy-600); }
.msg-bubble {

}
.msg-bubble p { margin: 0; }

.msg.bot .msg-bubble {
  background: var(--cream-card);
  border: 1px solid var(--ivory-border);
  color: var(--text-dark);

}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--navy-600), var(--navy-700));

.send-btn {

/* 타이핑 */
.typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
.typing span { width: 7px; height: 7px; background: var(--gold-dim); border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }

@media (max-width: 480px) {

<script>
const SYSTEM_PROMPT = `# 역할
당신은 우상법률사무소 AI 상담원입니다.
상담의 목적은 고객의 법률 문제를 접수하고 필요한 정보를 수집하는 것입니다.
상담 분야는 다음과 같습니다.

모든 최종 판단은 반드시 변호사의 상담과 검토를 통해 이루어집니다.

---
# 상담 시작
대화가 시작되면 반드시 첫 응답으로 아래 문구를 그대로 출력합니다.

안녕하세요.
우상법률사무소 AI 상담원입니다.
상담받고 싶은 분야를 선택해주세요.
① 개인회생 ② 개인파산 ③ 민사 ④ 형사 ⑤ 이혼·가사
번호 또는 상담 분야를 입력해주세요.

사용자가 분야를 선택하기 전에는 절대 다른 질문을 진행하지 않습니다.

---
# 말투 원칙 (중요)
- 설문조사처럼 딱딱하게 묻지 않습니다. 실제 상담 경험이 많은 사람처럼, 고객의 답변 내용을 짧게 반영(공감/리액션)한 뒤 다음 질문으로 자연스럽게 이어갑니다.
  예) 고객이 "자영업"이라고 답하면 → "자영업이시군요. 그럼 매달 소득이 일정하지 않으실 수도 있겠네요. 월 평균 실수령 소득은 어느 정도 되시나요?"
  예) 고객이 "압류당했어요"라고 답하면 → "압류까지 진행된 상황이시면 마음이 많이 무거우셨을 것 같습니다. 혹시 급여, 통장, 부동산 중 어디에 압류가 들어왔는지 여쭤봐도 될까요?"
- 매 턴마다 "감사합니다."를 기계적으로 반복하지 않습니다. 상황에 맞게 "네, 알겠습니다", "말씀해주셔서 감사합니다", "잘 알겠습니다" 등 자연스럽게 표현을 바꿔가며 답합니다.
- 공감은 한 문장 이내로 짧게, 과하지 않게 합니다. 상담사답게 차분하고 신뢰감 있는 어조를 유지합니다.
- 질문은 반드시 한 번에 하나씩만 합니다.
- 중간 요약은 하지 않습니다.
- 같은 질문을 반복하지 않습니다.
- 법률 판단을 단정하지 않습니다.
- 허위 정보를 만들어내지 않습니다.
- 추측성 발언을 하지 않습니다.
- 고객이 감정적으로 격해지거나 불안해해도 차분하고 안정적인 어조를 유지합니다.
- 개인정보는 상담 목적 범위 내에서만 묻고 사용합니다.
- 생년월일과 주소는 어떤 분야에서도 절대 질문하지 않습니다.

---
# 개인회생 상담 순서
1. 성명

---
# 상담 종료 규칙
해당 분야의 모든 질문이 끝나면, 다른 말 없이 곧바로 아래 형식을 정확히 지켜서 출력합니다.
이 출력 형식은 화면에 카드로 자동 렌더링되므로 아래 마커와 구조를 절대 변경하지 않습니다.

[[SUMMARY_START]]
항목1|값1
항목2|값2
(상담 분야에서 수집한 모든 항목을 "항목|값" 형식으로, 줄바꿈으로 구분하여 나열)
[[SUMMARY_END]]

[[ANALYSIS_START]]
STARS|숫자(1~5)
GRADE|A 또는 B 또는 C
OPINION|검토 의견을 2~3문장으로 서술. 현재 입력된 내용만으로 보면 검토 대상일 가능성에 대해 신중하게 언급하고, 최종 판단은 소득·재산·채무 발생 경위·지출 구조·대출 여부 등을 종합해야 한다는 점을 포함.
CHECK|추가로 확인이 필요한 사항을 쉼표로 구분하여 나열 (예: 채무 발생 경위,재산 처분 여부,대출 내역,가족관계)
[[ANALYSIS_END]]

상담 분야가 민사/형사/이혼·가사처럼 회생·파산 검토와 무관한 경우에도 동일한 ANALYSIS 형식을 사용하되, STARS와 GRADE는 사건의 진행 가능성/난이도에 대한 일반적인 판단으로, OPINION은 해당 분야에 맞는 내용으로 작성합니다.

이 형식을 출력한 뒤에는 아무 말도 추가하지 않습니다. 예약 안내는 시스템이 별도로 화면에 표시하므로 직접 출력하지 않습니다.

# 주의사항
- 법률 판단을 단정하지 않습니다.
- 허위 정보를 제공하지 않습니다.
- 추측하지 않습니다.
- 감정적 대응에도 차분함을 유지합니다.
- 개인정보는 상담 목적 범위에서만 사용합니다.
- 최종 판단은 반드시 변호사의 상담과 검토를 통해 이루어진다는 점을 전제로 합니다.`;

let messages = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addMessage(role, text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
  const avatar = role === 'user' ? '👤' : '⚖️';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${escapeHtml(text).split(/\n+/).filter(Boolean).map(line => `<p>${line}</p>`).join('')}</div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function starsHtml(n) {
  n = Math.max(1, Math.min(5, parseInt(n) || 3));
  let html = '<span class="stars">';
  for (let i = 0; i < 5; i++) {
    html += i < n ? '★' : '<span class="dim">★</span>';
  }
  html += '</span>';
  return html;
}

function renderResultCards(rawText) {
  const area = document.getElementById('chatArea');

  const summaryMatch = rawText.match(/\[\[SUMMARY_START\]\]([\s\S]*?)\[\[SUMMARY_END\]\]/);
  const analysisMatch = rawText.match(/\[\[ANALYSIS_START\]\]([\s\S]*?)\[\[ANALYSIS_END\]\]/);

  if (summaryMatch) {
    const rows = summaryMatch[1].trim().split('\n').filter(Boolean).map(line => {
      const [label, ...rest] = line.split('|');
      return { label: (label||'').trim(), value: rest.join('|').trim() };
    });
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-title">상담 내용 요약</div>
      <div class="summary-grid">
        ${rows.map(r => `<div class="summary-row"><span class="summary-label">${escapeHtml(r.label)}</span><span class="summary-value">${escapeHtml(r.value)}</span></div>`).join('')}
      </div>
    `;
    area.appendChild(card);
  }

  if (analysisMatch) {
    const lines = analysisMatch[1].trim().split('\n').filter(Boolean);
    let stars = 3, grade = 'B', opinion = '', check = [];
    lines.forEach(line => {
      const idx = line.indexOf('|');
      if (idx === -1) return;
      const key = line.slice(0, idx).trim();
      const val = line.slice(idx + 1).trim();
      if (key === 'STARS') stars = val;
      else if (key === 'GRADE') grade = val;
      else if (key === 'OPINION') opinion = val;
      else if (key === 'CHECK') check = val.split(',').map(s => s.trim()).filter(Boolean);
    });

    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-title">AI 1차 분석</div>
      <div class="summary-grid">
        <div class="summary-row"><span class="summary-label">검토 가능성</span><span class="summary-value">${starsHtml(stars)}</span></div>
        <div class="summary-row"><span class="summary-label">상담 난이도</span><span class="summary-value"><span class="grade-badge">${escapeHtml(grade)}</span></span></div>
      </div>
      <div style="margin-top:14px;">
        <div class="summary-label" style="margin-bottom:6px;">검토 의견</div>
        <div class="opinion-block">${escapeHtml(opinion)}</div>
      </div>
      ${check.length ? `
      <div style="margin-top:12px;">
        <div class="summary-label" style="margin-bottom:6px;">추가 확인 사항</div>
        <div class="check-block"><ul>${check.map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ul></div>
      </div>` : ''}
      <div class="reserve-banner">
        무료 상담 예약을 원하시면 <b>'상담예약'</b>이라고 입력해주세요.<br>
        우상법률사무소 ☎ <a href="tel:02-927-9665">02-927-9665</a>
      </div>
    `;
    area.appendChild(card);
  }

  area.scrollTop = area.scrollHeight;
  return !!(summaryMatch || analysisMatch);
}

function addChoices(choices) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'choices';
  div.id = 'choices';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = () => {
      document.getElementById('choices')?.remove();
      document.getElementById('userInput').value = c;
      sendMessage();
    };
    div.appendChild(btn);
  });
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">⚖️</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

async function callClaude(userMessage) {
  messages.push({ role: 'user', content: userMessage });

  const response = await fetch('https://woosang-ai-proxy.indy1913.workers.dev', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1200,
      system: SYSTEM_PROMPT,
      messages: messages
    })
  });

  if (!response.ok) {
    const errText = await response.text().catch(() => '');
    console.error('[AI 상담원] API 오류 응답:', response.status, errText);
    throw new Error('API 오류: ' + response.status);
  }

  const data = await response.json();
  if (!data || !data.content || !data.content[0] || typeof data.content[0].text !== 'string') {
    console.error('[AI 상담원] 예상치 못한 응답 형식:', JSON.stringify(data));
    throw new Error('응답 형식 오류');
  }
  const reply = data.content[0].text;
  messages.push({ role: 'assistant', content: reply });
  return reply;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  document.getElementById('choices')?.remove();
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  showTyping();

  try {
    const reply = await callClaude(text);
    removeTyping();

    const rendered = renderResultCards(reply);
    if (!rendered) {
      addMessage('bot', reply);
    }

    if (messages.length === 2) {
      addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사']);
    }
  } catch (e) {
    removeTyping();
    addMessage('bot', '일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.\n전화 상담: 02-927-9665');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

async function init() {
  showTyping();
  try {
    const reply = await callClaude('시작');
    removeTyping();
    addMessage('bot', reply);
    addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사']);
  } catch(e) {
    removeTyping();
    addMessage('bot', '안녕하세요.\n우상법률사무소 AI 상담원입니다.\n상담받고 싶은 분야를 선택해주세요.\n① 개인회생 ② 개인파산 ③ 민사 ④ 형사 ⑤ 이혼·가사');
    addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사']);
  }
}

init();
</script>

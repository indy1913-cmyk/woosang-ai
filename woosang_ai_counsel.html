# 상담 종료 규칙
해당 분야의 모든 질문이 끝나면, 다른 말 없이 곧바로 아래 형식을 정확히 지켜서 출력합니다.
이 출력 형식은 화면에 카드로 자동 렌더링되므로 아래 마커와 구조를 절대 변경하지 않습니다.

[[SUMMARY_START]]
항목1|값1
항목2|값2
(상담 분야에서 수집한 모든 항목을 "항목|값" 형식으로, 줄바꿈으로 구분하여 나열)
[[SUMMARY_END]]

[[ANALYSIS_START]]
STARS|숫자(1~5)
GRADE|A 또는 B 또는 C
OPINION|참고 안내 내용을 2~3문장으로 서술. 법률적 판단이 아닌 참고용 안내임을 전제로, 현재 입력된 상황에서 일반적으로 고려할 수 있는 사항을 안내하고, 정확한 법률 검토는 반드시 변호사 상담을 통해 받아야 한다는 점을 포함.
CHECK|추가로 확인이 필요한 사항을 쉼표로 구분하여 나열 (예: 채무 발생 경위,재산 처분 여부,대출 내역,가족관계)

function starsHtml(n) {

  return html;
}

function calcMonthlyPayment(rows) {
  // 개인회생 월 변제금은 단순 계산으로 확정할 수 없으므로,
  // 의뢰인이 이해하기 쉬운 "참고 범위"와 검토 포인트만 보여줍니다.
  const minLiving = {
    0: 1538543,
    1: 2520105,
    2: 3211916,
    3: 3906688,
    4: 4590000
  };

  let income = 0, family = 0, adjustedFamily = 0, propertyText = '', debtText = '';

  function parseMoney(text) {
    text = String(text || '').replace(/,/g, '');
    // 예: 200~300만 원, 100-200만 원 → 중간값 사용
    const rangeMan = text.match(/(\d+(?:\.\d+)?)\s*[~\-]\s*(\d+(?:\.\d+)?)\s*만/);
    if (rangeMan) return ((parseFloat(rangeMan[1]) + parseFloat(rangeMan[2])) / 2) * 10000;
    const man = text.match(/(\d+(?:\.\d+)?)\s*만/);
    if (man) return parseFloat(man[1]) * 10000;
    const nums = text.match(/\d+/g);
    if (!nums) return 0;
    const joined = nums.join('');
    const n = parseInt(joined, 10);
    // 300처럼 입력하면 300만 원으로 해석, 3000000이면 원 단위로 해석
    return n < 10000 ? n * 10000 : n;
  }

  rows.forEach(r => {
    const label = r.label || '';
    const value = r.value || '';
    if (label.includes('소득')) income = parseMoney(value);
    if (label.includes('부양가족')) {
      const m = value.match(/(\d+)/);
      if (m) family = Math.min(parseInt(m[1], 10), 4);
    }
    if (label.includes('재산')) propertyText = value;
    if (label.includes('채무')) debtText = value;
  });

  if (!income) return null;

  // 사용자가 입력한 부양가족 수에서 1명을 제외한 기준으로 생계비를 참고 계산합니다.
  // 예: 부양가족 2명 입력 → 1명 기준 생계비 적용
  adjustedFamily = Math.max(0, family - 1);
  const living = minLiving[adjustedFamily] || minLiving[0];
  const simpleLeft = income - living;

  // 실무 안내용 참고 범위: 최저생계비 초과분만 기계적으로 표시하지 않고,
  // 소득·부양가족·재산 여부를 고려해 "상담용 범위"로 완화 표시합니다.
  let low, high;
  if (income < 1500000) {
    low = 0;
    high = Math.max(150000, Math.round(income * 0.12));
  } else if (simpleLeft > 0) {
    low = Math.max(200000, Math.round(simpleLeft * 0.45));
    high = Math.max(low + 100000, Math.round(simpleLeft * 0.9));
  } else {
    low = Math.max(150000, Math.round(income * 0.08));
    high = Math.max(low + 150000, Math.round(income * 0.18));
  }

  // 재산이 있으면 청산가치 때문에 변제금이 높아질 수 있음을 범위에도 가볍게 반영
  const hasProperty = propertyText && !propertyText.includes('없음');
  if (hasProperty) {
    low = Math.round(low * 1.15);
    high = Math.round(high * 1.35);
  }

  const propertyNotice = hasProperty
    ? '부동산·차량·예금 등 재산이 있는 경우에는 청산가치가 반영되어 월 변제금이 증가하거나 변제기간에 영향을 줄 수 있습니다.'
    : '재산이 거의 없거나 적은 경우에도 채무 규모, 소득자료, 부양가족 인정 여부에 따라 월 변제금은 달라질 수 있습니다.';

  return { income, living, simpleLeft, low, high, family, adjustedFamily, propertyText, debtText, hasProperty, propertyNotice };
}

function saveToGoogleSheet(rows, analysis) {
  try {
    const findValue = (keyword, exclude) => {
      const r = rows.find(r => r.label.includes(keyword) && (!exclude || !r.label.includes(exclude)));
      return r ? r.value : '';
    };

    const phone = findValue('연락처');
    const income = findValue('소득');
    const debt = findValue('채무', '발생');
    const seizure = findValue('압류');

    // 상담분야 감지
    const labelSet = rows.map(r => r.label).join(',');
    let type = '기타';
    if (labelSet.includes('채권자 수')) type = '개인회생';
    else if (labelSet.includes('면책 이력')) type = '개인파산';
    else if (labelSet.includes('피해자')) type = '형사';
    else if (labelSet.includes('혼인 기간')) type = '이혼·가사';
    else if (labelSet.includes('사건 종류')) type = '민사';

    const content = rows.map(r => `${r.label}: ${r.value}`).join(' / ');
    const review = analysis && analysis.opinion ? analysis.opinion : '';

    const now = new Date();
    const timestamp = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

    fetch(SHEET_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ timestamp, phone, type, income, debt, seizure, content, review })
    }).catch(err => console.error('[구글 시트 저장 실패]', err));

    // Google Ads 전환 추적 - 상담신청완료
    if (typeof gtag === 'function') {
      gtag('event', 'conversion', {
        'send_to': 'AW-18280729484/WIDJCIvy48gcEIyX94xE',
        'value': 1.0,
        'currency': 'KRW'
      });
    }
  } catch (err) {
    console.error('[구글 시트 저장 오류]', err);
  }
}

          ? `참고 계산상 월 납부에 사용할 수 있는 금액은 약 ${fmt(calc.simpleLeft)}입니다.`

                ✔ ${escapeHtml(calc.propertyNotice)}<br>
                ※ 위 금액은 상담 전 참고 범위이며, 정확한 월 변제금은 자료 확인 후 변호사 검토로 산정됩니다.

        ${monthlyRow}

  }

  if (analysisMatch) {
    const lines = analysisMatch[1].trim().split('\n').filter(Boolean);
    let stars = 3, grade = 'B', opinion = '', check = [];
    lines.forEach(line => {
      const idx = line.indexOf('|');
      if (idx === -1) return;
      const key = line.slice(0, idx).trim();
      const val = line.slice(idx + 1).trim();
      if (key === 'STARS') stars = val;
      else if (key === 'GRADE') grade = val;
      else if (key === 'OPINION') opinion = val;

      </div>
      ${check.length ? `

        <div class="summary-label" style="margin-bottom:6px;">추가 확인 사항</div>
        <div class="check-block"><ul>${check.map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ul></div>
      </div>` : ''}
      <div class="reserve-banner">
        무료 상담 예약을 원하시면 <b>'상담예약'</b>이라고 입력해주세요.<br>
        우상법률사무소 ☎ <a href="tel:02-927-9665">02-927-9665</a>
      </div>
    `;
    area.appendChild(card);
  }

  // 준비서류 카드
  const docsMatch = rawText.match(/\[\[DOCS_START\]\]([\s\S]*?)\[\[DOCS_END\]\]/);
  if (docsMatch) {
    const rows = docsMatch[1].trim().split('\n').filter(Boolean).map(line => {
      const idx = line.indexOf('|');
      if (idx === -1) return null;
      return { label: line.slice(0, idx).trim(), value: line.slice(idx+1).trim() };
    }).filter(Boolean);
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-title">📋 준비 서류 안내</div>
      <div class="summary-grid">
        ${rows.map(r => `<div class="summary-row"><span class="summary-label">${escapeHtml(r.label)}</span><span class="summary-value" style="text-align:left; font-weight:400; color:var(--text-mid);">${escapeHtml(r.value)}</span></div>`).join('')}
      </div>
      <div style="margin-top:10px; font-size:12px; color:#999;">※ 위 서류는 일반적인 안내이며, 실제 필요 서류는 사건에 따라 달라질 수 있습니다.</div>
    `;
    area.appendChild(card);
  }

  if (summaryRowsForSheet) {
    saveToGoogleSheet(summaryRowsForSheet, analysisForSheet);
  }

  area.scrollTop = area.scrollHeight;
  return !!(summaryMatch || analysisMatch || docsMatch);
}

function addChoices(choices, disableInput = true) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'choices';
  div.id = 'choices';

  // 버튼이 있으면 텍스트 입력창 비활성화
  if (disableInput) {
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    input.disabled = true;
    input.placeholder = '위 버튼 중 하나를 선택해주세요';
    input.style.opacity = '0.5';
    sendBtn.disabled = true;
  }

  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = () => {
      document.getElementById('choices')?.remove();
      // 버튼 클릭 시 입력창 다시 활성화
      const input = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      input.disabled = false;
      input.placeholder = '메시지를 입력하세요...';
      input.style.opacity = '1';
      sendBtn.disabled = false;

      document.getElementById('userInput').value = c;
      sendMessage();
    };
    div.appendChild(btn);
  });
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

    check = '사건 발생 일시,상대방 인적사항,증거 자료,경찰 조사 일정,진술 내용';
  } else {
    stars = 3;
    opinion = '입력하신 내용을 기준으로 이혼·가사 사건 검토에 필요한 기초 정보가 접수되었습니다. 자녀, 재산, 혼인 기간, 상대방의 입장에 따라 진행 방향이 달라질 수 있으므로 변호사 상담을 통해 확인해야 합니다.';
    check = '배우자의 동의 여부,재산 목록 상세 내역,자녀 양육 현황,별거 여부';
  }

  let docs = '';
  if (fieldName === '개인회생') {
    docs = `\n[[DOCS_START]]\n신분증 사본|주민등록증 또는 운전면허증\n주민등록등본|최근 3개월 이내 발급\n가족관계증명서|최근 3개월 이내 발급\n소득 증빙 서류|급여명세서, 원천징수영수증, 매출장부 등\n채무 내역서|대출 잔액 확인서, 카드 이용내역, 채권자 목록\n통장 거래내역|최근 6개월~1년치 주거래 통장\n재산 관련 서류|부동산 등기부등본, 차량등록증 등 해당 자료\n압류 관련 서류|압류 통지서 또는 추심 관련 문자\n[[DOCS_END]]`;

    docs = `\n[[DOCS_START]]\n신분증 사본|주민등록증 또는 운전면허증\n주민등록등본|최근 3개월 이내 발급\n가족관계증명서|최근 3개월 이내 발급\n소득 관련 서류|급여명세서, 사업소득 자료 또는 무소득 확인 자료\n채무 내역서|대출 잔액 확인서, 카드 이용내역, 채권자 목록 전체\n통장 거래내역|최근 1~2년치 주거래 통장\n재산 관련 서류|부동산, 차량, 보험, 예금 관련 자료\n채무 발생 경위 자료|폐업 자료, 병원비 영수증, 보증 관련 자료 등\n[[DOCS_END]]`;
  }

  return `[[SUMMARY_START]]\n${summary}\n[[SUMMARY_END]]\n[[ANALYSIS_START]]\nSTARS|${stars}\nGRADE|${grade}\nOPINION|${opinion}\nCHECK|${check}\n[[ANALYSIS_END]]${docs}`;
}

async function callClaudePreview(userMessage) {
  await new Promise(r => setTimeout(r, 500));

  // 상담 가능 시간대 선택 처리
  if (previewTimeStep) {
    previewTimeStep = false;
    return `접수가 완료되었습니다.

상담 가능 시간은 '${userMessage}'으로 접수되었습니다.
담당자가 순차적으로 연락드리겠습니다.

우상법률사무소 ☎ 02-927-9665

다른 분야로 추가 상담이 필요하시면 아래에서 분야를 선택해주세요.`;
  }

  // 분야 선택 단계
  if (previewCurrentField === null) {
    const t = userMessage.replace(/\s/g, '');
    let detected = null;
    if (t.includes('개인회생') || t === '1' || t === '①') detected = '개인회생';
    else if (t.includes('개인파산') || t.includes('파산') || t === '2' || t === '②') detected = '개인파산';
    else if (t.includes('민사') || t === '3' || t === '③') detected = '민사';
    else if (t.includes('형사') || t === '4' || t === '④') detected = '형사';
    else if (t.includes('이혼') || t.includes('가사') || t === '5' || t === '⑤') detected = '이혼·가사';

    if (detected) {
      // 상태 완전 초기화
      previewCurrentField = detected;
      previewStep = 0;
      previewPhoneStep = false;
      previewAnswers = [];
      const field = PREVIEW_FIELDS[previewCurrentField];
      const firstChoices = field.choices && field.choices[0];
      const firstChoicesTag = firstChoices ? `\n[[CHOICES:${firstChoices.join('|')}]]` : '';
      return `${previewCurrentField} 상담을 선택하셨군요. 몇 가지 여쭤보겠습니다.\n\n${field.questions[0]}${firstChoicesTag}`;
    }

    // 전화상담 여부 응답 처리 (분야 미선택 상태에서 네/아니요 응답)
    if (previewPhoneStep) {
      previewPhoneStep = false;
      const t2 = userMessage.trim();
      if (t2.includes('네') || t2.includes('원') || t2.includes('예') || t2.includes('yes') || t2.includes('ㅇ')) {
        previewTimeStep = true;
        return '감사합니다. 담당 변호사가 연락드릴 수 있도록 접수하겠습니다.\n\n상담 가능 시간대를 선택해주세요.\n[[CHOICES:오전 가능|오후 가능|아무 때나 가능]]';
      } else {
        return '알겠습니다. 언제든 추가 상담이 필요하시면 다시 찾아주세요.\n\n우상법률사무소 ☎ 02-927-9665';
      }
    }

    return '죄송합니다, 분야를 다시 선택해주시겠어요?\n① 개인회생 ② 개인파산 ③ 민사 ④ 형사 ⑤ 이혼·가사';
  }

  const field = PREVIEW_FIELDS[previewCurrentField];

  // 마지막 질문(연락처)에 대한 답변 처리
  if (previewStep >= field.questions.length - 1) {
    const phone = userMessage.replace(/[-\s]/g, '');

    // 연락처 미입력 또는 건너뛰기 감지
    if (userMessage.trim() === '' || userMessage.includes('건너') || userMessage.includes('skip') || userMessage.includes('없음') || userMessage.includes('비공개')) {
      return '연락처를 입력하지 않으시면 상담 결과를 제공해드리기 어렵습니다.\n\n변호사가 직접 연락드리기 위해 연락처가 필요합니다. 전화번호를 입력해주시겠어요?';
    }

    // 전화번호 형식 검증 (숫자 10~11자리)
    if (!/^[0-9]{10,11}$/.test(phone)) {
      return '올바른 전화번호 형식이 아닌 것 같습니다.\n\n숫자만 입력해주세요. (예: 01012345678)';
    }

    // 정상 연락처 입력 → 입력한 값으로 결과 출력
    previewAnswers[previewStep] = userMessage;
    const completedFieldName = previewCurrentField;
    const result = buildPreviewResult(completedFieldName, field, userMessage);
    previewCurrentField = null;
    previewStep = -1;
    previewPhoneStep = true;
    previewTimeStep = false;
    return result + '\n\n[[PHONE_QUESTION]]';
  }

  // 현재 질문 답변 저장 후 다음 질문으로 진행
  previewAnswers[previewStep] = userMessage;
  previewStep++;
  const reactions = ['네, 확인했습니다.', '그러셨군요.', '말씀해주셔서 감사합니다.', '잘 알겠습니다.'];
  const reaction = reactions[previewStep % reactions.length];
  const nextQ = field.questions[previewStep];
  const nextChoices = field.choices && field.choices[previewStep];
  const choicesTag = nextChoices ? `\n[[CHOICES:${nextChoices.join('|')}]]` : '';
  return `${reaction}\n\n${nextQ}${choicesTag}`;
}

async function callClaude(userMessage) {
  messages.push({ role: 'user', content: userMessage });

  if (PREVIEW_MODE) {
    const reply = await callClaudePreview(userMessage);
    messages.push({ role: 'assistant', content: reply });
    return reply;
  }

  const response = await fetch('https://soft-math-61be.indy1913-55b.workers.dev', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1200,
      system: SYSTEM_PROMPT,
      messages: messages
    })
  });

  if (!response.ok) {
    const errText = await response.text().catch(() => '');
    console.error('[AI 상담원] API 오류 응답:', response.status, errText);
    throw new Error('API 오류: ' + response.status);
  }

  const data = await response.json();
  if (!data || !data.content || !data.content[0] || typeof data.content[0].text !== 'string') {
    console.error('[AI 상담원] 예상치 못한 응답 형식:', JSON.stringify(data));
    throw new Error('응답 형식 오류');
  }
  const reply = data.content[0].text;
  messages.push({ role: 'assistant', content: reply });
  return reply;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  // 미리보기 모드에서 텍스트 입력 질문에 너무 짧은 답변 차단
  if (PREVIEW_MODE && previewCurrentField !== null && text.length < 2) {
    input.style.borderColor = 'var(--gold)';
    input.placeholder = '좀 더 자세히 입력해주세요 (2글자 이상)';
    setTimeout(() => {
      input.style.borderColor = '';
      input.placeholder = '메시지를 입력하세요...';
    }, 2000);
    return;
  }

  document.getElementById('choices')?.remove();
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  showTyping();

  try {
    const reply = await callClaude(text);
    removeTyping();

    // [[CHOICES:...]] 신호 파싱 - 버튼 선택지 추출
    const choicesMatch = reply.match(/\[\[CHOICES:([^\]]+)\]\]/);
    const hasPhoneQ = reply.includes('[[PHONE_QUESTION]]');
    const hasPrivacyNotice = reply.includes('[[PRIVACY_NOTICE]]');
    let cleanReply = reply
      .replace(/\n\[\[CHOICES:[^\]]+\]\]/g, '')
      .replace(/\[\[CHOICES:[^\]]+\]\]/g, '')
      .replace('\n\n[[PHONE_QUESTION]]', '')
      .replace('[[PHONE_QUESTION]]', '')
      .replace('\n[[PRIVACY_NOTICE]]', '')
      .replace('[[PRIVACY_NOTICE]]', '');

    const rendered = renderResultCards(cleanReply);
    if (!rendered) {
      addMessage('bot', cleanReply);
    }

    if (hasPrivacyNotice) {
      addPrivacyNotice();
    }

    // 버튼 선택지 표시
    if (choicesMatch) {
      const choiceList = choicesMatch[1].split('|');
      addChoices(choiceList, true); // 입력창 비활성화
    } else if (!hasPhoneQ && !rendered) {
      // 버튼 없는 질문(직접 입력)일 때 입력창 명시적 활성화
      const input = document.getElementById('userInput');
      input.disabled = false;
      input.placeholder = '메시지를 입력하세요...';
      input.style.opacity = '1';
      document.getElementById('sendBtn').disabled = false;
    }

    if (hasPhoneQ) {
      setTimeout(() => {
        addMessage('bot', '위 검토 결과를 바탕으로 변호사와 무료 전화 상담을 원하시나요?');
        addChoices(['네, 연락 주세요', '아니요, 괜찮습니다']);
      }, 400);
    }

    // 전화상담 응답 후 다시 분야 선택 버튼 표시
    const isPhoneResponse = (text === '네, 연락 주세요' || text === '아니요, 괜찮습니다');
    const isTimeResponse = (text === '오전 가능' || text === '오후 가능' || text === '아무 때나 가능');
    if (text === '아니요, 괜찮습니다' || isTimeResponse) {
      setTimeout(() => {
        addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사']);
      }, 800);
    }

    // 분야 버튼은 init()에서만 띄움
  } catch (e) {
    removeTyping();
    addMessage('bot', '일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.\n전화 상담: 02-927-9665');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

    addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사']);
    return;
  }
  showTyping();
  try {
    const reply = await callClaude('시작');
    removeTyping();
    addMessage('bot', reply);

    addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사']);
  }
}

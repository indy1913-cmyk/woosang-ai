<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우상법률사무소 AI 상담원</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; }

/* 헤더 */
.header { background: #1a3a5c; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.header-icon { width: 40px; height: 40px; background: #2e7dd1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.header-info h1 { font-size: 16px; font-weight: 700; }
.header-info p { font-size: 12px; opacity: 0.7; margin-top: 2px; }
.online-badge { margin-left: auto; background: #22c55e; color: white; font-size: 11px; padding: 4px 10px; border-radius: 20px; }

/* 채팅 영역 */
.chat-area { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; max-width: 720px; width: 100%; margin: 0 auto; }

/* 메시지 */
.msg { display: flex; gap: 8px; align-items: flex-end; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: #2e7dd1; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.msg-bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
.msg.bot .msg-bubble { background: white; color: #1a1a1a; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.msg.user .msg-bubble { background: #2e7dd1; color: white; border-bottom-right-radius: 4px; }

/* 선택지 버튼 */
.choices { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0 4px 40px; }
.choice-btn { background: white; border: 2px solid #2e7dd1; color: #2e7dd1; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.choice-btn:hover { background: #2e7dd1; color: white; }

/* 입력 영역 */
.input-area { background: white; padding: 12px 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; align-items: flex-end; max-width: 720px; width: 100%; margin: 0 auto; }
.input-area textarea { flex: 1; border: 2px solid #e5e7eb; border-radius: 20px; padding: 10px 16px; font-size: 14px; resize: none; outline: none; font-family: inherit; max-height: 100px; transition: border-color 0.2s; }
.input-area textarea:focus { border-color: #2e7dd1; }
.send-btn { width: 40px; height: 40px; background: #2e7dd1; border: none; border-radius: 50%; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
.send-btn:hover { background: #1a5fa8; }
.send-btn:disabled { background: #9ca3af; cursor: not-allowed; }

/* 타이핑 표시 */
.typing { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
.typing span { width: 8px; height: 8px; background: #9ca3af; border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* 전화 버튼 */
.call-bar { background: #1a3a5c; color: white; text-align: center; padding: 10px; font-size: 13px; }
.call-bar a { color: #7dd3fc; text-decoration: none; font-weight: 700; }

.footer { background: white; padding: 8px; text-align: center; font-size: 11px; color: #9ca3af; border-top: 1px solid #f0f0f0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">⚖️</div>
  <div class="header-info">
    <h1>우상법률사무소 AI 상담원</h1>
    <p>개인회생 · 파산 · 민사 · 형사 · 이혼 · 상속</p>
  </div>
  <div class="online-badge">● 온라인</div>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="call-bar">
  📞 전화 상담 <a href="tel:02-927-9665">02-927-9665</a> | 평일 09:00 ~ 18:00
</div>

<div class="input-area">
  <textarea id="userInput" placeholder="메시지를 입력하세요..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<div class="footer">※ AI 상담 결과는 참고용이며, 최종 판단은 반드시 변호사 상담 후 결정됩니다.</div>

<script>
const SYSTEM_PROMPT = `당신은 우상법률사무소 AI 상담원입니다.
상담의 목적은 고객의 법률 문제를 접수하고 필요한 정보를 수집하는 것입니다.
상담 분야는 다음과 같습니다: 개인회생, 개인파산, 민사, 형사, 이혼·가사, 상속
당신은 변호사가 아니며 법률적 결론을 단정하지 않습니다.
모든 최종 판단은 반드시 변호사의 상담과 검토를 통해 이루어집니다.

대화가 시작되면 반드시 첫 응답으로 아래 문구를 출력합니다:
"안녕하세요.
우상법률사무소 AI 상담원입니다.
상담받고 싶은 분야를 선택해주세요.
① 개인회생 ② 개인파산 ③ 민사 ④ 형사 ⑤ 이혼·가사 ⑥ 상속
번호 또는 상담 분야를 입력해주세요."

공통 응대 원칙:
- 항상 친절하고 간결하게 응대합니다.
- 질문은 반드시 한 번에 하나씩 합니다.
- 고객 답변 후 "감사합니다."만 말하고 다음 질문으로 넘어갑니다.
- 중간 요약 금지, 같은 질문 반복 금지
- 예약 안내는 상담 종료 시 1회만 출력
- 법률 판단 단정 금지, 허위 정보 금지, 추측 금지
- 생년월일과 주소는 어떤 분야에서도 절대 질문하지 않습니다

개인회생 상담 순서: 성명 → 연락처 → 나이 → 직업 → 월 실수령 소득 → 총 채무 → 채권자 수 → 재산 → 부양가족 → 연체 여부 → 압류 여부 → 최근 1년 내 신규 대출 여부

개인파산 상담 순서: 성명 → 연락처 → 나이 → 직업 → 현재 소득 → 총 채무 → 재산 → 부양가족 → 채무 발생 경위 → 최근 재산 처분 여부 → 최근 대출 여부 → 면책 이력

민사 상담 순서: 사건 종류 확인 → 성명 → 연락처 → 상대방 → 사건 내용 → 진행 상황 → 증거 여부 → 원하는 결과

형사 상담 순서: 사건 종류 확인 → 성명 → 연락처 → 사건 내용 → 진행 단계 → 경찰 조사 여부 → 증거 여부

이혼·가사 상담 순서: 성명 → 연락처 → 혼인 기간 → 자녀 여부 → 재산 분할 → 양육권 → 원하는 결과

상속 상담 순서: 사건 종류 확인 → 성명 → 연락처 → 피상속인과의 관계 → 사망 일자 → 유언장 존재 여부 → 상속인 수 → 상속 재산 내역 → 상속 채무 여부 → 현재 가장 어려운 점

상담 종료 시 반드시 아래 형식으로 출력:
① 상담 내용 요약 (표 형식)
② AI 1차 분석 (검토 가능성 별점, 검토 의견, 추가 확인 사항, 상담 난이도 A/B/C)
③ 예약 안내: "무료 상담 예약을 원하시면 '상담예약'이라고 입력해주세요. 우상법률사무소 ☎ 02-927-9665"`;

let messages = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function addMessage(role, text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
  const avatar = role === 'user' ? '👤' : '⚖️';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addChoices(choices) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'choices';
  div.id = 'choices';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = () => {
      document.getElementById('choices')?.remove();
      document.getElementById('userInput').value = c;
      sendMessage();
    };
    div.appendChild(btn);
  });
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">⚖️</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

async function callClaude(userMessage) {
  messages.push({ role: 'user', content: userMessage });
  
  const response = await fetch('https://woosang-ai-proxy.indy1913.workers.dev', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: messages
    })
  });
  
  const data = await response.json();
  const reply = data.content[0].text;
  messages.push({ role: 'assistant', content: reply });
  return reply;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  
  document.getElementById('choices')?.remove();
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  
  addMessage('user', text);
  showTyping();
  
  try {
    const reply = await callClaude(text);
    removeTyping();
    addMessage('bot', reply);
    
    if (messages.length === 2) {
      addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사', '⑥ 상속']);
    }
  } catch (e) {
    removeTyping();
    addMessage('bot', '일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.\n전화 상담: 02-927-9665');
  }
  
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

async function init() {
  showTyping();
  try {
    const reply = await callClaude('시작');
    removeTyping();
    addMessage('bot', reply);
    addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사', '⑥ 상속']);
  } catch(e) {
    removeTyping();
    addMessage('bot', '안녕하세요.\n우상법률사무소 AI 상담원입니다.\n상담받고 싶은 분야를 선택해주세요.\n① 개인회생 ② 개인파산 ③ 민사 ④ 형사 ⑤ 이혼·가사 ⑥ 상속');
    addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사', '⑥ 상속']);
  }
}

init();
</script>
</body>
</html>

<script>
/* 기존 script 전체 삭제 후 여기에 붙여넣기 */
const SYSTEM_PROMPT = `# 역할
당신은 우상법률사무소 AI 상담원입니다.
상담의 목적은 고객의 법률 문제를 접수하고 필요한 정보를 수집하는 것입니다.

상담 분야:
1. 개인회생
2. 개인파산
3. 민사
4. 형사
5. 이혼·가사

첫 응답은 반드시 아래 문구만 출력합니다.

안녕하세요.
우상법률사무소 AI 상담원입니다.
상담받고 싶은 분야를 선택해주세요.
① 개인회생 ② 개인파산 ③ 민사 ④ 형사 ⑤ 이혼·가사
번호 또는 상담 분야를 입력해주세요.

질문은 반드시 한 번에 하나씩만 합니다.
생년월일과 주소는 절대 질문하지 않습니다.
법률 판단을 단정하지 않습니다.

개인회생 상담 순서:
성명, 연락처, 나이, 직업, 월 실수령 소득, 총 채무, 채권자 수, 재산, 부양가족, 연체 여부, 압류 여부, 최근 1년 내 신규 대출 여부

개인파산 상담 순서:
성명, 연락처, 나이, 직업, 현재 소득, 총 채무, 재산, 부양가족, 채무 발생 경위, 최근 재산 처분 여부, 최근 대출 여부, 면책 이력

민사 상담 순서:
사건 종류 확인, 성명, 연락처, 상대방, 사건 내용, 진행 상황, 증거 여부, 원하는 결과

형사 상담 순서:
사건 종류 확인, 성명, 연락처, 사건 내용, 진행 단계, 경찰 조사 여부, 증거 여부

이혼·가사 상담 순서:
성명, 연락처, 혼인 기간, 자녀 여부, 재산 분할, 양육권, 원하는 결과

모든 질문이 끝나면 반드시 아래 형식 그대로 출력합니다.

[[SUMMARY_START]]
항목|값
항목|값
[[SUMMARY_END]]

[[ANALYSIS_START]]
STARS|3
GRADE|B
OPINION|현재 입력된 내용만으로 보면 변호사 상담을 통해 구체적인 검토가 필요합니다. 최종 판단은 관련 자료와 사실관계를 종합해 확인해야 합니다.
CHECK|추가 자료,증거 여부,진행 상황
[[ANALYSIS_END]]

위 마커 외 다른 말은 추가하지 않습니다.`;

let messages = [];
let isLoading = false;

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  if (!area) return;
  setTimeout(() => {
    area.scrollTop = area.scrollHeight;
  }, 50);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function escapeHtml(str = '') {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function addMessage(role, text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;

  const avatar = role === 'user' ? '👤' : '⚖️';

  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
  `;

  area.appendChild(div);
  scrollToBottom();
}

function parseLine(line) {
  if (!line) return null;

  let clean = line.replace(/^[\s*\-#>]+/, '').trim();

  let idx = clean.indexOf('|');
  if (idx === -1) idx = clean.indexOf(':');
  if (idx === -1) return null;

  const key = clean.slice(0, idx).replace(/\*/g, '').trim();
  const val = clean.slice(idx + 1).replace(/\*/g, '').trim();

  if (!key) return null;

  return { key, val };
}

function starsHtml(n) {
  n = Math.max(1, Math.min(5, parseInt(n) || 3));

  let html = '<span class="stars">';
  for (let i = 0; i < 5; i++) {
    html += i < n ? '★' : '<span class="dim">★</span>';
  }
  html += '</span>';

  return html;
}

function renderResultCards(rawText) {
  const area = document.getElementById('chatArea');

  const summaryMatch = rawText.match(/\[\[\s*SUMMARY_START\s*\]\]([\s\S]*?)\[\[\s*SUMMARY_END\s*\]\]/i);
  const analysisMatch = rawText.match(/\[\[\s*ANALYSIS_START\s*\]\]([\s\S]*?)\[\[\s*ANALYSIS_END\s*\]\]/i);

  let rendered = false;

  if (summaryMatch) {
    const rows = summaryMatch[1]
      .trim()
      .split(/\n+/)
      .map(parseLine)
      .filter(Boolean);

    if (rows.length > 0) {
      rendered = true;

      const card = document.createElement('div');
      card.className = 'result-card';

      card.innerHTML = `
        <div class="result-title">
          <span class="badge-icon">📋</span>상담 내용 요약
        </div>
        <div class="summary-grid">
          ${rows.map(r => `
            <div class="summary-row">
              <span class="summary-label">${escapeHtml(r.key)}</span>
              <span class="summary-value">${escapeHtml(r.val)}</span>
            </div>
          `).join('')}
        </div>
      `;

      area.appendChild(card);
    }
  }

  if (analysisMatch) {
    const parsed = analysisMatch[1]
      .trim()
      .split(/\n+/)
      .map(parseLine)
      .filter(Boolean);

    let stars = 3;
    let grade = 'B';
    let opinion = '';
    let check = [];

    parsed.forEach(({ key, val }) => {
      const k = key.toUpperCase();

      if (k === 'STARS') stars = val;
      if (k === 'GRADE') grade = val;
      if (k === 'OPINION') opinion = val;
      if (k === 'CHECK') {
        check = val.split(',').map(v => v.trim()).filter(Boolean);
      }
    });

    rendered = true;

    const card = document.createElement('div');
    card.className = 'result-card';

    card.innerHTML = `
      <div class="result-title">
        <span class="badge-icon">⚖️</span>AI 1차 분석
      </div>

      <div class="summary-grid">
        <div class="summary-row">
          <span class="summary-label">검토 가능성</span>
          <span class="summary-value">${starsHtml(stars)}</span>
        </div>

        <div class="summary-row">
          <span class="summary-label">상담 난이도</span>
          <span class="summary-value">
            <span class="grade-badge">${escapeHtml(grade)}</span>
          </span>
        </div>
      </div>

      <div style="margin-top:20px;">
        <div class="section-label">검토 의견</div>
        <div class="opinion-block">${escapeHtml(opinion || '검토 의견을 불러오지 못했습니다.')}</div>
      </div>

      ${check.length ? `
      <div style="margin-top:18px;">
        <div class="section-label">추가 확인 사항</div>
        <div class="check-block">
          <ul>
            ${check.map(c => `
              <li>
                <span style="color:var(--gold); font-weight:700;">✓</span>
                ${escapeHtml(c)}
              </li>
            `).join('')}
          </ul>
        </div>
      </div>
      ` : ''}

      <div class="reserve-banner">
        무료 상담 예약을 원하시면 <b>'상담예약'</b>이라고 입력해주세요.<br>
        우상법률사무소 ☎ <a href="tel:02-927-9665">02-927-9665</a>
      </div>
    `;

    area.appendChild(card);
  }

  scrollToBottom();
  return rendered;
}

function addChoices(choices) {
  const area = document.getElementById('chatArea');

  document.getElementById('choices')?.remove();

  const div = document.createElement('div');
  div.className = 'choices';
  div.id = 'choices';

  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;

    btn.onclick = () => {
      document.getElementById('choices')?.remove();
      document.getElementById('userInput').value = c;
      sendMessage();
    };

    div.appendChild(btn);
  });

  area.appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const area = document.getElementById('chatArea');

  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';

  div.innerHTML = `
    <div class="msg-avatar">⚖️</div>
    <div class="msg-bubble">
      <div class="typing">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;

  area.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

async function callClaude(userMessage) {
  messages.push({
    role: 'user',
    content: userMessage
  });

  const response = await fetch('https://woosang-ai-proxy.indy1913.workers.dev', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1200,
      system: SYSTEM_PROMPT,
      messages: messages
    })
  });

  if (!response.ok) {
    throw new Error('API 응답 오류: ' + response.status);
  }

  const data = await response.json();

  let reply = '';

  if (data?.content?.[0]?.text) {
    reply = data.content[0].text;
  } else if (data?.reply) {
    reply = data.reply;
  } else if (data?.text) {
    reply = data.text;
  } else if (data?.message) {
    reply = data.message;
  } else {
    console.log('AI 원본 응답:', data);
    throw new Error('AI 응답 형식을 읽지 못했습니다.');
  }

  messages.push({
    role: 'assistant',
    content: reply
  });

  return reply;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  const text = input.value.trim();

  if (!text || isLoading) return;

  document.getElementById('choices')?.remove();

  input.value = '';
  input.style.height = 'auto';

  isLoading = true;
  sendBtn.disabled = true;

  addMessage('user', text);
  showTyping();

  try {
    const reply = await callClaude(text);

    removeTyping();

    const rendered = renderResultCards(reply);

    if (!rendered) {
      addMessage('bot', reply);
    }

    if (messages.length === 2) {
      addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사']);
    }

  } catch (e) {
    console.error(e);

    removeTyping();

    addMessage(
      'bot',
      '일시적인 오류가 발생했습니다.\n잠시 후 다시 시도해주세요.\n전화 상담: 02-927-9665'
    );
  }

  isLoading = false;
  sendBtn.disabled = false;
  scrollToBottom();
}

async function init() {
  showTyping();

  try {
    const reply = await callClaude('시작');

    removeTyping();

    const rendered = renderResultCards(reply);

    if (!rendered) {
      addMessage('bot', reply);
    }

    addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사']);

  } catch (e) {
    console.error(e);

    removeTyping();

    addMessage(
      'bot',
      '안녕하세요.\n우상법률사무소 AI 상담원입니다.\n상담받고 싶은 분야를 선택해주세요.\n① 개인회생 ② 개인파산 ③ 민사 ④ 형사 ⑤ 이혼·가사\n번호 또는 상담 분야를 입력해주세요.'
    );

    addChoices(['① 개인회생', '② 개인파산', '③ 민사', '④ 형사', '⑤ 이혼·가사']);
  }
}

init();
</script>
